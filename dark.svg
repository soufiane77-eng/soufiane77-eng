<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="1180" height="610">
  <defs>
    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- ASCII gradient -->
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#7C3AED;#10B981;#22D3EE" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#10B981;#22D3EE;#7C3AED" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowText" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22D3EE" flood-opacity="0.6"/>
    </filter>
    <filter id="panelBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>

    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <!-- Scanline gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="40%" stop-color="rgba(34,211,238,0.03)"/>
      <stop offset="50%" stop-color="rgba(34,211,238,0.08)"/>
      <stop offset="60%" stop-color="rgba(34,211,238,0.03)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Glass reflection gradient -->
    <linearGradient id="glassReflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1180" height="610" rx="16" fill="#030712"/>

  <!-- Background glows -->
  <circle cx="200" cy="300" r="250" fill="#7C3AED" opacity="0.06">
    <animate attributeName="cx" values="200;250;200" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="300;250;300" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="200" r="200" fill="#22D3EE" opacity="0.04">
    <animate attributeName="cx" values="900;950;900" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;250;200" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="500" r="180" fill="#10B981" opacity="0.03">
    <animate attributeName="cx" values="600;550;600" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="500;450;500" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- Noise overlay -->
  <rect width="1180" height="610" rx="16" filter="url(#noise)" opacity="0.03"/>

  <!-- Scanline sweep -->
  <rect x="0" y="-100" width="1180" height="100" fill="url(#scanGrad)" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,-100;0,710;0,-100" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="150" cy="120" r="1.5" fill="#22D3EE"><animate attributeName="cy" values="120;100;120" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="80" r="1" fill="#7C3AED"><animate attributeName="cy" values="80;60;80" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="500" r="1.5" fill="#10B981"><animate attributeName="cy" values="500;480;500" dur="3.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0.9;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="150" r="1" fill="#22D3EE"><animate attributeName="cy" values="150;130;150" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="400" r="1.5" fill="#7C3AED"><animate attributeName="cy" values="400;380;400" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="100" r="1" fill="#10B981"><animate attributeName="cy" values="100;80;100" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="300" r="1" fill="#22D3EE"><animate attributeName="cy" values="300;280;300" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="520" r="1.5" fill="#7C3AED"><animate attributeName="cy" values="520;500;520" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="450" r="1" fill="#10B981"><animate attributeName="cy" values="450;430;450" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="60" r="1" fill="#22D3EE"><animate attributeName="cy" values="60;40;60" dur="5.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Border shimmer -->
  <rect width="1180" height="610" rx="16" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== LEFT SIDE: ASCII ART (38% = ~448px) ===== -->
  <g transform="translate(30, 30)">
    <!-- ASCII portrait - line by line reveal -->
    <g font-family="'Courier New', Courier, monospace" font-size="15" fill="url(#asciiGrad)" filter="url(#glowText)">
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
    </g>

    <!-- Floating ASCII effect -->
    <animateTransform attributeName="transform" type="translate" values="30,30;30,25;30,30" dur="6s" repeatCount="indefinite"/>

    <!-- Typing cursor -->
    <rect x="235" y="26" width="9" height="17" fill="#22D3EE" opacity="0.8" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ===== RIGHT SIDE: TERMINAL (62% = ~732px) ===== -->
  <g transform="translate(480, 30)">
    <!-- Terminal background (glassmorphism) -->
    <rect width="660" height="550" rx="12" fill="#0F172A" opacity="0.7"/>
    <rect width="660" height="550" rx="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect width="660" height="275" rx="12" fill="url(#glassReflect)"/>

    <!-- Terminal header -->
    <rect width="660" height="36" rx="12" fill="rgba(255,255,255,0.03)"/>
    <circle cx="20" cy="18" r="5" fill="#FF5F57"/>
    <circle cx="38" cy="18" r="5" fill="#FEBC2E"/>
    <circle cx="56" cy="18" r="5" fill="#28C840"/>
    

    <!-- Greeting -->
    
    
    

    <!-- Animated typing roles -->
    
    
    
    
    

    <!-- Typing cursor for roles -->
    <rect x="44" y="129" width="8" height="15" fill="#22D3EE" opacity="0.8" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="0.8s" repeatCount="indefinite"/>
    </rect>

    <!-- Info items -->
    <g font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#94A3B8">
      
      
      
      
      
    </g>

    <!-- Separator line -->
    <line x1="24" y1="288" x2="636" y2="288" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Skills section -->
    

    <!-- Skill pills row 1 -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.2s" dur="0.5s" fill="freeze"/>
      <rect x="24" y="330" width="62" height="26" rx="13" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
      </rect>
      

      <rect x="96" y="330" width="72" height="26" rx="13" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.3)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      

      <rect x="178" y="330" width="72" height="26" rx="13" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="2.8s" repeatCount="indefinite"/>
      </rect>
      

      <rect x="260" y="330" width="88" height="26" rx="13" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3.2s" repeatCount="indefinite"/>
      </rect>
      

      <rect x="358" y="330" width="78" height="26" rx="13" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.3)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3.8s" repeatCount="indefinite"/>
      </rect>
      

      <rect x="446" y="330" width="68" height="26" rx="13" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      
    </g>

    <!-- Skill pills row 2 -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.5s" dur="0.5s" fill="freeze"/>
      <rect x="24" y="366" width="68" height="26" rx="13" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3.1s" repeatCount="indefinite"/>
      </rect>
      

      <rect x="102" y="366" width="98" height="26" rx="13" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.3)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3.6s" repeatCount="indefinite"/>
      </rect>
      

      <rect x="210" y="366" width="52" height="26" rx="13" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="2.9s" repeatCount="indefinite"/>
      </rect>
      

      <rect x="272" y="366" width="44" height="26" rx="13" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.3)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3.3s" repeatCount="indefinite"/>
      </rect>
      

      <rect x="326" y="366" width="52" height="26" rx="13" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.3)" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3.4s" repeatCount="indefinite"/>
      </rect>
      
    </g>

    <!-- Separator -->
    <line x1="24" y1="410" x2="636" y2="410" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Social icons -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="6s" dur="0.5s" fill="freeze"/>

      <!-- GitHub -->
      <g transform="translate(24, 430)" filter="url(#glow)">
        <circle cx="16" cy="16" r="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1">
          <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
        </circle>
        <path d="M16 4C9.37 4 4 9.37 4 16c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0028 16c0-6.63-5.37-12-12-12z" fill="#F8FAFC"/>
        <animateTransform attributeName="transform" type="translate" values="24,430;24,427;24,430" dur="3s" repeatCount="indefinite"/>
      </g>

      <!-- LinkedIn -->
      <g transform="translate(80, 430)" filter="url(#glow)">
        <circle cx="16" cy="16" r="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1">
          <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="4.5s" repeatCount="indefinite"/>
        </circle>
        <path d="M6 9h4v12H6V9zm2-6a2 2 0 110 4 2 2 0 010-4zm5 6h3.8v1.6h.05c.53-1 1.83-2.1 3.77-2.1 4.03 0 4.78 2.66 4.78 6.12V21h-4v-5.3c0-1.27-.02-2.9-1.77-2.9-1.77 0-2.04 1.38-2.04 2.81V21h-4V9z" fill="#F8FAFC"/>
        <animateTransform attributeName="transform" type="translate" values="80,430;80,427;80,430" dur="3.5s" repeatCount="indefinite"/>
      </g>

      <!-- Twitter/X -->
      <g transform="translate(136, 430)" filter="url(#glow)">
        <circle cx="16" cy="16" r="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1">
          <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="3.8s" repeatCount="indefinite"/>
        </circle>
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="#F8FAFC"/>
        <animateTransform attributeName="transform" type="translate" values="136,430;136,427;136,430" dur="4s" repeatCount="indefinite"/>
      </g>

      <!-- Portfolio -->
      <g transform="translate(192, 430)" filter="url(#glow)">
        <circle cx="16" cy="16" r="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1">
          <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="4.2s" repeatCount="indefinite"/>
        </circle>
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" fill="none" stroke="#F8FAFC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <animateTransform attributeName="transform" type="translate" values="192,430;192,427;192,430" dur="3.2s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <!-- Glass reflection overlay -->
  <rect width="1180" height="305" rx="16" fill="url(#glassReflect)" opacity="0.3"/>
<image href="soso.jpg" x="835" y="120" width="220" height="220" preserveAspectRatio="xMidYMid slice" clip-path="circle(110px at 110px 110px)"/></svg>